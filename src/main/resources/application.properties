spring.application.name=demo

# Server
server.port=8080

# Default database (H2 in-memory). Override with DB_URL/DB_USERNAME/DB_PASSWORD anytime.
spring.datasource.url=${DB_URL:jdbc:h2:mem:ecommerce;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# JWT
app.jwt.secret=${JWT_SECRET:bnlMdkdzbnN4Y3B2eTQ5d2VoM3dwY2VmMXVjaXJiYmxzNTRmYmhoN2x1dXFxZWY5ZA==}
app.jwt.access-token-expiration-minutes=${JWT_ACCESS_MINUTES:30}
app.jwt.refresh-token-expiration-days=${JWT_REFRESH_DAYS:14}
